<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trinishopaholic Cost Calculator</title>
  <style>
    body {
      font-family: "Aptos Narrow", sans-serif;
      font-size: small;
      background-color: #1E3A5F;
      color: #ffffff;
      text-align: center;
    }
    .title {
      font-family: "Aptos Display", sans-serif;
      font-size: 28px;
      color: #ffffff;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }
    #jsResults {
      background: #ffffff;
      color: #000;
      padding: 20px;
      margin: 20px auto;
      width: 60%;
      border-radius: 10px;
    }
    p {
      font-weight: bold;
      margin: 10px 0;
    }
    hr {
      border: 1px solid #000;
    }
  </style>
</head>
<body>

  <h1 class="title">Custom Orders</h1>
  <h2 class="title">Cost Calculator</h2>

  <div>
    <input type="number" id="ttdInput" placeholder="Enter TTD Amount">
    <br>
    <button onclick="calculate()">Calculate</button>
  </div>

  <div id="jsResults" hidden>
    <p><strong>TTD to USD =</strong> <span id="usdResult"></span></p>
    <p><strong>Total TTD 10 to 1USD=</strong> <span id="multResult"></span></p>
    <p><strong>Service Fee (5%):</strong> <span id="feeResult"></span></p>
    <hr>
    <p><strong><big>Total Cost:</big></strong> <span id="totalResult" style="font-weight:bold;"></span></p>
  </div>

  <script>
    function calculate() {
      const ttd = parseFloat(document.getElementById("ttdInput").value);
      if (isNaN(ttd)) {
        alert("Please enter a valid TTD amount.");
        return;
      }

      // Step 1: TTD to USD
      const usdAmount = ttd / 6.8;

      // Step 2: USD × 10
      const multResult = usdAmount * 10;

      // Step 3: 5% service fee on both
      const serviceFee = 0.05 * (usdAmount + multResult);

      // Step 4: Total cost
      const total = usdAmount + multResult + serviceFee;

      // Display results
      document.getElementById("usdResult").textContent = usdAmount.toFixed(2);
      document.getElementById("multResult").textContent = multResult.toFixed(2);
      document.getElementById("feeResult").textContent = serviceFee.toFixed(2);
      document.getElementById("totalResult").textContent = total.toFixed(2);

      document.getElementById("jsResults").hidden = false;
    }
  </script>


<script src="https://static.app/js/static.js" type="text/javascript"></script>
  <p> Calculate Total Cost for sites that ship directly to Trinidad (with included customs clearance fees)e.g temuTT</p>
</body>
</html>
